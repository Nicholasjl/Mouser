<?xml version="1.0" encoding="UTF-8"?>
<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- G PRO 2 Lightspeed Mouse SVG -->
  <!-- Simple representation of a gaming mouse -->

  <!-- Mouse body -->
  <ellipse cx="110" cy="110" rx="80" ry="40" fill="#1a1a1a" stroke="#333" stroke-width="2"/>

  <!-- Left click area -->
  <path d="M 40 110 Q 40 60 70 60 Q 100 60 110 90" fill="#2a2a2a" stroke="none"/>

  <!-- Right click area -->
  <path d="M 180 110 Q 180 60 150 60 Q 120 60 110 90" fill="#2a2a2a" stroke="none"/>

  <!-- Scroll wheel -->
  <rect x="100" y="80" width="20" height="40" rx="10" fill="#444" stroke="#666" stroke-width="1"/>

  <!-- DPI switch button -->
  <rect x="95" y="155" width="30" height="15" rx="5" fill="#555" stroke="#777" stroke-width="1"/>

  <!-- Side buttons (left) -->
  <rect x="50" y="100" width="15" height="20" rx="7" fill="#444" stroke="#666" stroke-width="1"/>

  <!-- Side buttons (right) -->
  <rect x="155" y="100" width="15" height="20" rx="7" fill="#444" stroke="#666" stroke-width="1"/>

  <!-- Logo area -->
  <circle cx="110" cy="110" r="25" fill="#0a0a0a" opacity="0.3"/>
  <text x="110" y="115" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">G</text>

  <!-- LED indicators -->
  <circle cx="95" cy="175" r="2" fill="#ff3333"/>
  <circle cx="110" cy="175" r="2" fill="#33ff33"/>
  <circle cx="125" cy="175" r="2" fill="#3333ff"/>
</svg>